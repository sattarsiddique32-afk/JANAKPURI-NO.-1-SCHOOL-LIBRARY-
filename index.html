<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Management Web App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom Animations */
    .fade-in { animation: fadeIn 0.8s ease-in-out; }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

    .slide-in { animation: slideIn 0.6s ease-in-out; }
    @keyframes slideIn { from {transform:translateX(50px);opacity:0;} to {transform:translateX(0);opacity:1;} }

    .glow { animation: glowPulse 2s infinite alternate; }
    @keyframes glowPulse {
      from { text-shadow: 0 0 5px #6ee7b7; }
      to { text-shadow: 0 0 15px #3b82f6; }
    }

    .toast { transition: opacity 0.5s ease; }
  </style>
</head>
<body class="bg-gradient-to-r from-blue-50 to-indigo-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-lg p-6">
    <h1 class="text-2xl font-bold mb-6">Library</h1>
    <nav class="space-y-4">
      <button class="nav-btn w-full text-left p-2 rounded hover:bg-blue-100" data-page="dashboard">Dashboard</button>
      <button class="nav-btn w-full text-left p-2 rounded hover:bg-blue-100" data-page="addBook">Add Book</button>
      <button class="nav-btn w-full text-left p-2 rounded hover:bg-blue-100" data-page="issueBook">Issue Book</button>
      <button class="nav-btn w-full text-left p-2 rounded hover:bg-blue-100" data-page="records">Records</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main id="mainContent" class="flex-1 p-8 fade-in">
    <!-- Pages injected here -->
  </main>

  <!-- Footer Branding -->
  <footer class="fixed bottom-2 right-2 text-sm glow">
    MADE BY ISUF 👑
  </footer>

  <!-- JavaScript -->
  <script>
    // ===============================
    // Library Management Web App
    // ===============================

    // Global State
    let books = JSON.parse(localStorage.getItem('books')) || [];
    let issued = JSON.parse(localStorage.getItem('issued')) || [];

    // Utility: Save to localStorage
    function saveData() {
      localStorage.setItem('books', JSON.stringify(books));
      localStorage.setItem('issued', JSON.stringify(issued));
    }

    // Utility: Toast Notification
    function showToast(message, type="success") {
      const toast = document.createElement('div');
      toast.className = `toast fixed top-4 right-4 px-4 py-2 rounded shadow-lg 
        ${type==="success" ? "bg-green-500 text-white" : "bg-red-500 text-white"} fade-in`;
      toast.innerText = message;
      document.body.appendChild(toast);
      setTimeout(()=>toast.style.opacity="0", 2500);
      setTimeout(()=>toast.remove(), 3000);
    }

    // Page Loader
    function loadPage(page) {
      const main = document.getElementById('mainContent');
      main.innerHTML = ""; // clear
      if(page==="dashboard") renderDashboard(main);
      if(page==="addBook") renderAddBook(main);
      if(page==="issueBook") renderIssueBook(main);
      if(page==="records") renderRecords(main);
    }

    // Dashboard
    function renderDashboard(container) {
      const total = books.length;
      const issuedCount = issued.length;
      const available = total - issuedCount;

      container.innerHTML = `
        <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          ${statCard("Total Books", total, "📚")}
          ${statCard("Issued Books", issuedCount, "✅")}
          ${statCard("Available Books", available, "📖")}
        </div>
      `;
    }

    // Stat Card Component
    function statCard(title, value, icon) {
      return `
        <div class="bg-white p-6 rounded shadow hover:shadow-xl transition transform hover:-translate-y-1 slide-in">
          <div class="text-4xl">${icon}</div>
          <h3 class="text-xl font-semibold">${title}</h3>
          <p class="text-2xl font-bold">${value}</p>
        </div>
      `;
    }

    // Add Book Page
    function renderAddBook(container) {
      container.innerHTML = `
        <h2 class="text-3xl font-bold mb-6">Add Book</h2>
        <form id="addBookForm" class="space-y-4">
          <input type="file" accept="image/*" capture="camera" class="block w-full border p-2 rounded" id="bookImage">
          <input type="text" placeholder="Book Number (required)" class="block w-full border p-2 rounded" id="bookNumber" required>
          <input type="text" placeholder="Book Name" class="block w-full border p-2 rounded" id="bookName">
          <input type="text" placeholder="Book Category" class="block w-full border p-2 rounded" id="bookCategory">
          <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">Save Book</button>
        </form>
        <div id="preview" class="mt-4"></div>
      `;

      document.getElementById('bookImage').addEventListener('change', e=>{
        const file = e.target.files[0];
        if(file){
          const reader = new FileReader();
          reader.onload = ()=> {
            document.getElementById('preview').innerHTML = `<img src="${reader.result}" class="w-32 h-32 object-cover rounded">`;
          };
          reader.readAsDataURL(file);
        }
      });

      document.getElementById('addBookForm').addEventListener('submit', e=>{
        e.preventDefault();
        const number = document.getElementById('bookNumber').value.trim();
        if(!number){ showToast("Book Number is required","error"); return; }
        const name = document.getElementById('bookName').value.trim();
        const category = document.getElementById('bookCategory').value.trim();
        const image = document.querySelector('#preview img')?.src || "";

        books.push({number, name, category, image});
        saveData();
        showToast("Book added successfully!");
        loadPage("records");
      });
    }

    // Issue Book Page (multi-step)
    function renderIssueBook(container) {
      container.innerHTML = `
        <h2 class="text-3xl font-bold mb-6">Issue Book</h2>
        <div id="issueSteps" class="space-y-4">
          <div class="step" data-step="1">
            <input type="text" placeholder="Enter Book Code" id="issueBookCode" class="border p-2 rounded w-full">
            <button class="nextBtn bg-blue-500 text-white px-4 py-2 rounded mt-2">Next</button>
          </div>
          <div class="step hidden" data-step="2">
            <input type="text" placeholder="Student ID" id="studentId" class="border p-2 rounded w-full">
            <button class="nextBtn bg-blue-500 text-white px-4 py-2 rounded mt-2">Next</button>
          </div>
          <div class="step hidden" data-step="3">
            <input type="text" placeholder="Student Name" id="studentName" class="border p-2 rounded w-full">
            <input type="text" placeholder="Class" id="studentClass" class="border p-2 rounded w-full mt-2">
            <input type="text" placeholder="Roll Number" id="studentRoll" class="border p-2 rounded w-full mt-2">
            <button id="submitIssue" class="bg-green-500 text-white px-4 py-2 rounded mt-2">Submit</button>
          </div>
        </div>
      `;

      const steps = container.querySelectorAll('.step');
      let currentStep = 0;

      function showStep(index){
        steps.forEach((s,i
